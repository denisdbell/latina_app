# ============================================================
# Ingress for dev namespace
# Access: http://<EXTERNAL-IP>/
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: latina-ingress
  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - http:
      paths:
      - path: /api/image
        pathType: Prefix
        backend:
          service:
            name: image-service
            port:
              number: 80
      - path: /api/phrase
        pathType: Prefix
        backend:
          service:
            name: phrase-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
---
