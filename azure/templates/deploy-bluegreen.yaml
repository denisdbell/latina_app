parameters:
- name: environmentName
  type: string
- name: namespace
  type: string
- name: aksServiceConnection
  type: string
- name: targetAcrConnection
  type: string
- name: targetAcrLoginServer
  type: string
- name: imageRepository
  type: string
- name: imageTag
  type: string
- name: serviceName
  type: string
- name: promoteImage
  type: boolean
  default: false
- name: sourceAcrConnection
  type: string
  default: ''
- name: sourceAcrLoginServer
  type: string
  default: ''
- name: imageUrl
  type: string
  default: ''
- name: phraseUrl
  type: string
  default: ''

jobs:
# ── Job 1: Prepare manifest and detect active slot ───────────────────────────
- deployment: Prepare_${{ parameters.environmentName }}
  displayName: 'Prepare Manifest for ${{ parameters.environmentName }}'
  dependsOn: []
  environment: ${{ parameters.environmentName }}
  pool:
    vmImage: 'ubuntu-latest'
  strategy:
    runOnce:
      deploy:
        steps:
        - checkout: self

        # Detect active slot using Kubernetes task
        - task: Kubernetes@1
          displayName: 'Detect Active Slot'
          name: detectSlot
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'svc ${{ parameters.serviceName }} -n ${{ parameters.namespace }} -o jsonpath={.spec.selector.slot}'
          continueOnError: true

        # Prepare manifest with slot variables
        - script: |
            SERVICE_NAME="${{ parameters.serviceName }}"
            IMAGE_URL="${{ parameters.targetAcrLoginServer }}/${{ parameters.imageRepository }}:${{ parameters.imageTag }}"
            NAMESPACE="${{ parameters.namespace }}"

            # Default to blue for first deployment
            ACTIVE_SLOT="blue"

            # Determine target slot (opposite of active)
            if [ "$ACTIVE_SLOT" = "blue" ]; then
              TARGET_SLOT="green"
            else
              TARGET_SLOT="blue"
            fi

            echo "Active slot: ${ACTIVE_SLOT}"
            echo "Target slot: ${TARGET_SLOT}"

            # Set pipeline variables for subsequent jobs
            echo "##vso[task.setvariable variable=activeSlot;isOutput=true]${ACTIVE_SLOT}"
            echo "##vso[task.setvariable variable=targetSlot;isOutput=true]${TARGET_SLOT}"

            # Update deployment manifest with slot parameter
            sed -i "s|#{SLOT}#|${TARGET_SLOT}|g" ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml
            sed -i "s|<ACR_LOGIN_SERVER>|${{ parameters.targetAcrLoginServer }}|g" ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml
            sed -i "s|#{IMAGE_TAG}#|${{ parameters.imageTag }}|g" ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml"

            # Update namespace in manifests
            sed -i "s|namespace: inspire|namespace: ${NAMESPACE}|g" ${SERVICE_NAME}/k8s/service.yaml
            sed -i "s|namespace: inspire|namespace: ${NAMESPACE}|g" ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml

            # For frontend-service, inject service URLs
            if [ "$SERVICE_NAME" = "frontend-service" ]; then
              sed -i "s|#{IMAGE_SERVICE_URL}#|${{ parameters.imageUrl }}|g" ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml
              sed -i "s|#{PHRASE_SERVICE_URL}#|${{ parameters.phraseUrl}}|g" ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml
            fi

            echo "Manifest after substitution:"
            cat ${SERVICE_NAME}/k8s/deployment-bluegreen.yaml
          displayName: 'Prepare Manifest with Slot Variables'
          name: prepareManifest

        - publish: ${{ parameters.serviceName }}/k8s
          artifact: manifest-${{ parameters.serviceName }}-${{ parameters.environmentName }}
          displayName: 'Publish Manifest Artifact'

# ── Job 2: Deploy to inactive slot ─────────────────────────────────────────────
- deployment: Deploy_${{ parameters.environmentName }}
  displayName: 'Deploy to ${{ parameters.environmentName }} (Blue-Green)'
  dependsOn: Prepare_${{ parameters.environmentName }}
  environment: ${{ parameters.environmentName }}
  pool:
    vmImage: 'ubuntu-latest'
  variables:
    targetSlot: $[ dependencies.Prepare_${{ parameters.environmentName }}.outputs['detectSlot.targetSlot'] ]
    activeSlot: $[ dependencies.Prepare_${{ parameters.environmentName }}.outputs['detectSlot.activeSlot'] ]
  strategy:
    runOnce:
      deploy:
        steps:
        # Conditionally promote the image between ACRs
        - ${{ if eq(parameters.promoteImage, true) }}:
          - template: promote-acr.yaml
            parameters:
              sourceAcrConnection: ${{ parameters.sourceAcrConnection }}
              sourceAcrLoginServer: ${{ parameters.sourceAcrLoginServer }}
              targetAcrConnection: ${{ parameters.targetAcrConnection }}
              targetAcrLoginServer: ${{ parameters.targetAcrLoginServer }}
              imageRepository: ${{ parameters.imageRepository }}
              imageTag: ${{ parameters.imageTag }}

        # Download the manifest artifact
        - download: current
          artifact: manifest-${{ parameters.serviceName }}-${{ parameters.environmentName }}
          displayName: 'Download Manifest Artifact'

        # Ensure the namespace exists
        - task: Kubernetes@1
          displayName: 'Ensure Namespace Exists: ${{ parameters.namespace }}'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'apply'
            useConfigurationFile: true
            inline: |
              apiVersion: v1
              kind: Namespace
              metadata:
                name: ${{ parameters.namespace }}

        # Deploy service (ensures slot label is present)
        - task: KubernetesManifest@1
          displayName: 'Deploy Service to AKS'
          inputs:
            action: 'deploy'
            connectionType: 'kubernetesServiceConnection'
            kubernetesServiceConnection: '${{ parameters.aksServiceConnection }}'
            namespace: '${{ parameters.namespace }}'
            manifests: |
              $(Pipeline.Workspace)/manifest-${{ parameters.serviceName }}-${{ parameters.environmentName }}/service.yaml

        # Deploy to the inactive slot (blue or green)
        - task: KubernetesManifest@1
          displayName: 'Deploy to $(targetSlot) Slot'
          inputs:
            action: 'deploy'
            connectionType: 'kubernetesServiceConnection'
            kubernetesServiceConnection: '${{ parameters.aksServiceConnection }}'
            namespace: '${{ parameters.namespace }}'
            manifests: |
              $(Pipeline.Workspace)/manifest-${{ parameters.serviceName }}-${{ parameters.environmentName }}/deployment-bluegreen.yaml

        # Wait for deployment to be ready
        - task: Kubernetes@1
          displayName: 'Wait for Deployment Ready'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'rollout'
            arguments: 'status deployment/${{ parameters.serviceName }}-$(targetSlot) -n ${{ parameters.namespace }} --timeout=300s'

        - task: Kubernetes@1
          displayName: 'Check Deployment Status'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'pods -n ${{ parameters.namespace }} -l app=${{ parameters.serviceName }},slot=$(targetSlot)'

        # Verify health checks pass before switch
        - task: Kubernetes@1
          displayName: 'Verify Health Checks'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'pods -n ${{ parameters.namespace }} -l app=${{ parameters.serviceName }},slot=$(targetSlot) -o jsonpath={.items[*].status.conditions[?(@.type=="Ready")].status}'

# ── Job 3: Switch traffic to new slot ─────────────────────────────────────────
- deployment: Switch_Traffic_${{ parameters.environmentName }}
  displayName: 'Switch Traffic to New Slot'
  dependsOn: Deploy_${{ parameters.environmentName }}
  condition: succeeded()
  environment: ${{ parameters.environmentName }}
  pool:
    vmImage: 'ubuntu-latest'
  variables:
    targetSlot: $[ dependencies.Prepare_${{ parameters.environmentName }}.outputs['detectSlot.targetSlot'] ]
    activeSlot: $[ dependencies.Prepare_${{ parameters.environmentName }}.outputs['detectSlot.activeSlot'] ]
  strategy:
    runOnce:
      deploy:
        steps:
        # Switch service selector to new slot
        - task: Kubernetes@1
          displayName: 'Switch Service Selector to $(targetSlot)'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'patch'
            arguments: 'svc ${{ parameters.serviceName }} -n ${{ parameters.namespace }} -p "{\"spec\":{\"selector\":{\"app\":\"${{ parameters.serviceName }}\",\"slot\":\"$(targetSlot)\"}}}"'

        # Verify service selector updated
        - task: Kubernetes@1
          displayName: 'Verify Service Selector'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'svc ${{ parameters.serviceName }} -n ${{ parameters.namespace }} -o jsonpath={.spec.selector}'

        # Check endpoints are populated
        - task: Kubernetes@1
          displayName: 'Verify Endpoints'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'endpoints ${{ parameters.serviceName }} -n ${{ parameters.namespace }}'

        # Verify traffic routing
        - task: Kubernetes@1
          displayName: 'Verify Traffic Routing'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'pods -n ${{ parameters.namespace }} -l app=${{ parameters.serviceName }},slot=$(targetSlot)'