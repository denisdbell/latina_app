parameters:
- name: environmentName
  type: string
- name: namespace
  type: string
- name: aksServiceConnection
  type: string
- name: serviceName
  type: string

jobs:
- deployment: Rollback_${{ parameters.environmentName }}
  displayName: 'Rollback ${{ parameters.serviceName }} in ${{ parameters.environmentName }}'
  environment: ${{ parameters.environmentName }}
  pool:
    vmImage: 'ubuntu-latest'
  strategy:
    runOnce:
      deploy:
        steps:
        # Step 1: Detect current active slot
        - task: Kubernetes@1
          displayName: 'Detect Current Active Slot'
          name: detectSlot
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'svc ${{ parameters.serviceName }} -n ${{ parameters.namespace }} -o jsonpath={.spec.selector.slot}'

        # Step 2: Determine rollback target and verify deployment exists
        - script: |
            SERVICE_NAME="${{ parameters.serviceName }}"
            NAMESPACE="${{ parameters.namespace }}"

            echo "=== Determining Rollback Target ==="

            # Get current slot from previous task output
            # Default to blue if not set
            CURRENT_SLOT="${CURRENT_SLOT:-blue}"

            if [ -z "$CURRENT_SLOT" ] || [ "$CURRENT_SLOT" = "" ]; then
              CURRENT_SLOT="blue"
            fi

            # Determine rollback target (opposite of current)
            if [ "$CURRENT_SLOT" = "blue" ]; then
              ROLLBACK_SLOT="green"
            else
              ROLLBACK_SLOT="blue"
            fi

            echo "Current active slot: ${CURRENT_SLOT}"
            echo "Rollback target slot: ${ROLLBACK_SLOT}"

            # Set variable for next step
            echo "##vso[task.setvariable variable=rollbackSlot]${ROLLBACK_SLOT}"
          displayName: 'Determine Rollback Slot'

        # Step 3: Verify rollback deployment exists
        - task: Kubernetes@1
          displayName: 'Verify Rollback Deployment Exists'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'deployment ${{ parameters.serviceName }}-$(rollbackSlot) -n ${{ parameters.namespace }} -o name'

        # Step 4: Verify rollback pods are ready
        - task: Kubernetes@1
          displayName: 'Check Rollback Pod Status'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'pods -n ${{ parameters.namespace }} -l app=${{ parameters.serviceName }},slot=$(rollbackSlot)'

        # Step 5: Switch service selector to rollback slot
        - task: Kubernetes@1
          displayName: 'Switch Service Selector to Rollback Slot'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'patch'
            arguments: 'svc ${{ parameters.serviceName }} -n ${{ parameters.namespace }} -p "{\"spec\":{\"selector\":{\"app\":\"${{ parameters.serviceName }}\",\"slot\":\"$(rollbackSlot)\"}}}"'

        # Step 6: Verify service selector updated
        - task: Kubernetes@1
          displayName: 'Verify Service Selector Updated'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'svc ${{ parameters.serviceName }} -n ${{ parameters.namespace }} -o jsonpath={.spec.selector}'

        # Step 7: Check endpoints after rollback
        - task: Kubernetes@1
          displayName: 'Verify Endpoints After Rollback'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'endpoints ${{ parameters.serviceName }} -n ${{ parameters.namespace }}'

        # Step 8: Verify rollback pods are serving traffic
        - task: Kubernetes@1
          displayName: 'Verify Rollback Pods'
          inputs:
            connectionType: 'Kubernetes Service Connection'
            kubernetesServiceEndpoint: '${{ parameters.aksServiceConnection }}'
            command: 'get'
            arguments: 'pods -n ${{ parameters.namespace }} -l app=${{ parameters.serviceName }},slot=$(rollbackSlot) -o wide'

        # Step 9: Log rollback summary
        - script: |
            echo "=========================================="
            echo "=== ROLLBACK COMPLETE ==="
            echo "=========================================="
            echo "Service: ${{ parameters.serviceName }}"
            echo "Namespace: ${{ parameters.namespace }}"
            echo "Traffic now routing to: $(rollbackSlot) slot"
            echo "Previous slot was: $(currentSlot)"
            echo "=========================================="
          displayName: 'Log Rollback Summary'