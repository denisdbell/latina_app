# Blue-Green Deployment Pipeline for Frontend Service
# This pipeline implements zero-downtime deployments using Kubernetes service selector switching.
#
# How it works:
# 1. Build: Compile and push Docker image to ACR
# 2. Deploy: Deploy to inactive slot (blue or green), verify health, then switch traffic
# 3. Rollback: Instant rollback by switching service selector to previous slot
#
# Prerequisites:
# - Services must have 'slot' label in selector
# - Deployments must be named {service-name}-{slot}
# - ResourceQuota must allow 2x replicas for blue+green transition

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend-service/**
      - pom.xml
      - azure/pipelines/frontend-service-bluegreen.yml

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: templates
      type: git
      name: PetClinic/latina_app_template
      ref: main

variables:
  # AKS and Common Variables
  aksServiceConnection: 'aks-service-connection'
  imageRepository: 'frontend-service'

  # UPDATE THIS VALUE: Replace with the uniqueSuffix from your ARM deployment output
  uniqueSuffix: 'REPLACE_ME'

  # Service URLs (update these based on your environment)
  devImageUrl: 'http://image-service.dev.svc.cluster.local'
  devPhraseUrl: 'http://phrase-service.dev.svc.cluster.local'
  testImageUrl: 'http://image-service.test.svc.cluster.local'
  testPhraseUrl: 'http://phrase-service.test.svc.cluster.local'
  prodImageUrl: 'http://image-service.prod.svc.cluster.local'
  prodPhraseUrl: 'http://phrase-service.prod.svc.cluster.local'

  # Dev Environment
  devAcrConnection: 'dev-acr-service-connection'
  devAcrLoginServer: 'acrlatinadev$(uniqueSuffix).azurecr.io'

  # Testing Environment
  testAcrConnection: 'test-acr-service-connection'
  testAcrLoginServer: 'acrlatinatest$(uniqueSuffix).azurecr.io'

  # Prod Environment
  prodAcrConnection: 'prod-acr-service-connection'
  prodAcrLoginServer: 'acrlatinaprod$(uniqueSuffix).azurecr.io'

stages:
# ── Build Stage ──────────────────────────────────────────────────────────────
- stage: Build
  displayName: 'Build Frontend Service'
  jobs:
  - job: BuildJob
    steps:
    - template: build.yaml@templates
      parameters:
        serviceName: 'frontend-service'
        devAcrConnection: '$(devAcrConnection)'
        imageRepository: '$(imageRepository)'

# ── Deploy to Development (Blue-Green) ───────────────────────────────────────
- stage: DeployDev
  displayName: 'Deploy to Development (Blue-Green)'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - template: deploy-bluegreen.yaml@templates
    parameters:
      environmentName: 'dev'
      namespace: 'dev'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: false
      targetAcrConnection: '$(devAcrConnection)'
      targetAcrLoginServer: '$(devAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'frontend-service'
      imageUrl: '$(devImageUrl)'
      phraseUrl: '$(devPhraseUrl)'

# ── Manual Approval - Promote to Testing ─────────────────────────────────────
- stage: ApproveTesting
  displayName: 'Manual Approval - Promote to Testing'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - job: WaitForApprovalTesting
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Validate Dev deployment. Check that the blue-green switch completed successfully. Approve promotion to Testing.'

# ── Deploy to Testing (Blue-Green) ───────────────────────────────────────────
- stage: DeployTest
  displayName: 'Deploy to Testing (Blue-Green)'
  dependsOn: ApproveTesting
  condition: succeeded()
  jobs:
  - template: deploy-bluegreen.yaml@templates
    parameters:
      environmentName: 'testing'
      namespace: 'test'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: true
      sourceAcrConnection: '$(devAcrConnection)'
      sourceAcrLoginServer: '$(devAcrLoginServer)'
      targetAcrConnection: '$(testAcrConnection)'
      targetAcrLoginServer: '$(testAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'frontend-service'
      imageUrl: '$(testImageUrl)'
      phraseUrl: '$(testPhraseUrl)'

# ── Manual Approval - Promote to Production ─────────────────────────────────
- stage: ApproveProd
  displayName: 'Manual Approval - Promote to Production'
  dependsOn: DeployTest
  condition: succeeded()
  jobs:
  - job: WaitForApprovalProd
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Confirm Testing sign-off. Verify blue-green deployment worked correctly. Approve Production deployment.'

# ── Deploy to Production (Blue-Green) ────────────────────────────────────────
- stage: DeployProd
  displayName: 'Deploy to Production (Blue-Green)'
  dependsOn: ApproveProd
  condition: succeeded()
  jobs:
  - template: deploy-bluegreen.yaml@templates
    parameters:
      environmentName: 'prod'
      namespace: 'prod'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: true
      sourceAcrConnection: '$(testAcrConnection)'
      sourceAcrLoginServer: '$(testAcrLoginServer)'
      targetAcrConnection: '$(prodAcrConnection)'
      targetAcrLoginServer: '$(prodAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'frontend-service'
      imageUrl: '$(prodImageUrl)'
      phraseUrl: '$(prodPhraseUrl)'

# ── Rollback Stage (Manual) ──────────────────────────────────────────────────
# This stage is manually triggered for instant rollback.
# Usage: When a deployment fails or has issues, run this stage to instantly
# switch traffic back to the previous slot without any pod restarts.
- stage: RollbackProd
  displayName: 'Rollback Production'
  dependsOn: DeployProd
  condition: succeeded()
  jobs:
  - deployment: WaitForRollbackDecision
    environment: 'prod-rollback'
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: '⚠️ ROLLBACK: This will instantly switch traffic back to the previous deployment. Only use if the current production deployment has issues. Approve to proceed with rollback.'

  - template: rollback.yaml@templates
    parameters:
      environmentName: 'prod'
      namespace: 'prod'
      aksServiceConnection: '$(aksServiceConnection)'
      serviceName: 'frontend-service'