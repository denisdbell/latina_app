trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend-service/**
      - pom.xml
      - azure/pipelines/frontend-service-bluegreen.yml

pool:
  vmImage: ubuntu-latest

resources:
  repositories:
    - repository: templates
      type: git
      name: LatinaApp2/latina_app_template
      ref: working

variables:
  # AKS and Common Variables
  aksServiceConnection: aks-service-connection
  imageRepository: frontend-service

  # UPDATE THIS VALUE: Replace with the uniqueSuffix from your ARM deployment output
  uniqueSuffix: funvbtai

  # Service URLs (update these based on your environment)
  devImageUrl: http://image-service.dev.svc.cluster.local
  devPhraseUrl: http://phrase-service.dev.svc.cluster.local
  testImageUrl: http://image-service.test.svc.cluster.local
  testPhraseUrl: http://phrase-service.test.svc.cluster.local
  prodImageUrl: http://image-service.prod.svc.cluster.local
  prodPhraseUrl: http://phrase-service.prod.svc.cluster.local

  # Dev Environment
  devAcrConnection: dev-acr-service-connection
  devAcrLoginServer: acrlatinadev$(uniqueSuffix).azurecr.io

  # Testing Environment
  testAcrConnection: test-acr-service-connection
  testAcrLoginServer: acrlatinatest$(uniqueSuffix).azurecr.io

  # Prod Environment
  prodAcrConnection: prod-acr-service-connection
  prodAcrLoginServer: acrlatinaprod$(uniqueSuffix).azurecr.io

stages:
  # ── Build Stage ─────────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build Frontend Service
    jobs:
      - job: BuildJob
        steps:
          - template: build.yaml@templates
            parameters:
              serviceName: frontend-service
              devAcrConnection: $(devAcrConnection)
              imageRepository: $(imageRepository)

  # ── Deploy to Development ──────────────────────────────────────────────────
  - stage: DeployDev
    displayName: Deploy to Development
    dependsOn: Build
    condition: succeeded()
    jobs:
      - template: deploy.yaml@templates
        parameters:
          environmentName: dev
          namespace: dev
          aksServiceConnection: $(aksServiceConnection)
          promoteImage: false
          targetAcrConnection: $(devAcrConnection)
          targetAcrLoginServer: $(devAcrLoginServer)
          imageRepository: $(imageRepository)
          imageTag: $(Build.BuildId)
          serviceName: frontend-service
          imageUrl: $(devImageUrl)
          phraseUrl: $(devPhraseUrl)

  # ── Manual Approval - Promote to Testing ────────────────────────────────────
  - stage: ApproveTesting
    displayName: Manual Approval - Promote to Testing
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - job: WaitForApprovalTesting
        pool: server
        timeoutInMinutes: 1440
        steps:
          - task: ManualValidation@0
            inputs:
              instructions: >-
                Dev deployment completed successfully.
                Approve promotion to Testing environment.

  # ── Deploy to Testing ──────────────────────────────────────────────────────
  - stage: DeployTest
    displayName: Deploy to Testing
    dependsOn: ApproveTesting
    condition: succeeded()
    jobs:
      - template: deploy.yaml@templates
        parameters:
          environmentName: testing
          namespace: test
          aksServiceConnection: $(aksServiceConnection)
          promoteImage: true
          sourceAcrConnection: $(devAcrConnection)
          sourceAcrLoginServer: $(devAcrLoginServer)
          targetAcrConnection: $(testAcrConnection)
          targetAcrLoginServer: $(testAcrLoginServer)
          imageRepository: $(imageRepository)
          imageTag: $(Build.BuildId)
          serviceName: frontend-service
          imageUrl: $(testImageUrl)
          phraseUrl: $(testPhraseUrl)

  # ── Manual Approval - Promote to Production ──────────────────────────────────
  - stage: ApproveProd
    displayName: Manual Approval - Promote to Production
    dependsOn: DeployTest
    condition: succeeded()
    jobs:
      - job: WaitForApprovalProd
        pool: server
        timeoutInMinutes: 1440
        steps:
          - task: ManualValidation@0
            inputs:
              instructions: >-
                Testing environment deployment completed successfully.
                Verify all tests passed and deployment is stable.
                Approve Production deployment.

  # ── Deploy to Production (Blue-Green) ───────────────────────────────────────
  - stage: DeployProdGreen
    displayName: Deploy to Production Green Slot
    dependsOn: ApproveProd
    condition: succeeded()
    jobs:
      - template: deploy-bluegreen.yaml@templates
        parameters:
          environmentName: prod
          namespace: prod
          aksServiceConnection: $(aksServiceConnection)
          promoteImage: true
          sourceAcrConnection: $(testAcrConnection)
          sourceAcrLoginServer: $(testAcrLoginServer)
          targetAcrConnection: $(prodAcrConnection)
          targetAcrLoginServer: $(prodAcrLoginServer)
          imageRepository: $(imageRepository)
          imageTag: $(Build.BuildId)
          serviceName: frontend-service
          imageUrl: $(prodImageUrl)
          phraseUrl: $(prodPhraseUrl)

  - stage: DeployProdBlue
    displayName: Deploy to Production Blue Slot
    dependsOn: DeployProdGreen
    condition: succeeded()
    jobs:
      - template: deploy-bluegreen.yaml@templates
        parameters:
          environmentName: prod
          namespace: prod
          aksServiceConnection: $(aksServiceConnection)
          promoteImage: true
          sourceAcrConnection: $(testAcrConnection)
          sourceAcrLoginServer: $(testAcrLoginServer)
          targetAcrConnection: $(prodAcrConnection)
          targetAcrLoginServer: $(prodAcrLoginServer)
          imageRepository: $(imageRepository)
          imageTag: $(Build.BuildId)
          serviceName: frontend-service
          imageUrl: $(prodImageUrl)
          phraseUrl: $(prodPhraseUrl)

  # ── Test Production Blue/Green Deployments ────────────────────────────────────
  - stage: TestProdBlueGreen
    displayName: Test Production Blue/Green Deployments
    dependsOn: DeployProdBlue
    condition: succeeded()
    jobs:
      - job: DisplayTestLinks
        displayName: Display Blue/Green Test Links
        steps:
          - task: Bash@3
            displayName: Output Blue/Green Test URLs
            inputs:
              targetType: inline
              script: |
                echo "============================================================"
                echo "  PRODUCTION ENVIRONMENT - BLUE/GREEN DEPLOYMENT TESTING"
                echo "============================================================"
                echo ""
                echo "🔵 BLUE DEPLOYMENT (New Version - Build $(Build.BuildId)):"
                echo "   URL: https://frontend-service-blue.prod.example.com"
                echo "   Health Check: https://frontend-service-blue.prod.example.com/health"
                echo "   API Docs: https://frontend-service-blue.prod.example.com/swagger-ui.html"
                echo ""
                echo "🟢 GREEN DEPLOYMENT (Previous Version - Currently Live):"
                echo "   URL: https://frontend-service-green.prod.example.com"
                echo "   Health Check: https://frontend-service-green.prod.example.com/health"
                echo "   API Docs: https://frontend-service-green.prod.example.com/swagger-ui.html"
                echo ""
                echo "📊 Current Live Traffic: GREEN"
                echo "   Live URL: https://frontend-service.prod.example.com"
                echo ""
                echo "============================================================"
                echo "  TESTING INSTRUCTIONS"
                echo "============================================================"
                echo "1. Test the BLUE (new) deployment thoroughly"
                echo "2. Test the GREEN (previous) deployment for comparison"
                echo "3. Verify performance metrics on BLUE deployment"
                echo "4. Check logs for any errors on BLUE deployment"
                echo "5. Get sign-off from all stakeholders"
                echo "6. Approve below to switch traffic from GREEN to BLUE"
                echo "============================================================"

      - job: ApproveSwitchProd
        displayName: Approve Traffic Switch
        dependsOn: DisplayTestLinks
        pool: server
        timeoutInMinutes: 1440
        steps:
          - task: ManualValidation@0
            inputs:
              instructions: >-
                🔵 TESTING BLUE/GREEN DEPLOYMENTS - PRODUCTION

                ⚠️ CRITICAL: This is a PRODUCTION deployment approval.
                Please verify BOTH deployments before approving the traffic switch:

                BLUE DEPLOYMENT (New - Build $(Build.BuildId)):
                • Test URL: https://frontend-service-blue.prod.example.com
                • Health: https://frontend-service-blue.prod.example.com/health
                • API Docs: https://frontend-service-blue.prod.example.com/swagger-ui.html

                GREEN DEPLOYMENT (Previous - Currently Live):
                • Test URL: https://frontend-service-green.prod.example.com
                • Health: https://frontend-service-green.prod.example.com/health
                • API Docs: https://frontend-service-green.prod.example.com/swagger-ui.html

                CHECKLIST:
                □ BLUE deployment health check passes
                □ BLUE deployment smoke tests completed successfully
                □ BLUE deployment performance within acceptable limits
                □ No critical errors in BLUE deployment logs
                □ GREEN deployment still running and stable (fallback ready)
                □ Stakeholder sign-off obtained
                □ Rollback plan confirmed
                □ Ready to switch traffic from GREEN → BLUE

                Approve to proceed with traffic switch.

  # ── Rollback Stage (Manual) ──────────────────────────────────────────────────
  # This stage is manually triggered for instant rollback.
  # Usage: When a deployment fails or has issues, run this stage to instantly
  # switch traffic back to the previous slot without any pod restarts.
  - stage: RollbackProd
    displayName: Rollback Production
    dependsOn: TestProdBlueGreen
    condition: succeeded()
    jobs:
      - deployment: WaitForRollbackDecision
        environment: prod-rollback
        pool: server
        timeoutInMinutes: 1440
        strategy:
          runOnce:
            deploy:
              steps:
                - task: ManualValidation@0
                  inputs:
                    instructions: >-
                      ⚠️ ROLLBACK: This will instantly switch traffic back to the
                      previous deployment. Only use if the current production
                      deployment has issues. Approve to proceed with rollback.

      - template: rollback.yaml@templates
        parameters:
          environmentName: prod
          namespace: prod
          aksServiceConnection: $(aksServiceConnection)
          serviceName: frontend-service