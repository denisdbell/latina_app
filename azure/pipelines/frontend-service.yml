trigger:
  branches:
    include:
      - dast-scan
  paths:
    include:
      - frontend-service/**
      - pom.xml
      - azure/pipelines/frontend-service.yml

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: templates
      type: git
      name: LatinaApp/latina_app_template
      ref: main

variables:
  # AKS and Common Variables
  aksServiceConnection: 'aks-service-connection'
  imageRepository: 'frontend-service'

  uniqueSuffix: 'rs25m4je'

  # AKS Cluster Details
  aksResourceGroup: 'rg-latina'
  aksClusterName: 'aks-latina-shared'

  # Service URLs
  devImageUrl: 'http://image-service.dev.svc.cluster.local:8081'
  devPhraseUrl: 'http://phrase-service.dev.svc.cluster.local:8082'
  testImageUrl: 'http://image-service.test.svc.cluster.local:8081'
  testPhraseUrl: 'http://phrase-service.test.svc.cluster.local:8082'
  prodImageUrl: 'http://image-service.prod.svc.cluster.local:8081'
  prodPhraseUrl: 'http://phrase-service.prod.svc.cluster.local:8082'

  # Dev Environment
  devAcrConnection: 'acr-shared-service-connection'
  devAcrLoginServer: 'acrlatinashared$(uniqueSuffix).azurecr.io'

  # Testing Environment
  testAcrConnection: 'acr-shared-service-connection'
  testAcrLoginServer: 'acrlatinashared$(uniqueSuffix).azurecr.io'

  # Prod Environment
  prodAcrConnection: 'acr-shared-service-connection'
  prodAcrLoginServer: 'acrlatinashared$(uniqueSuffix).azurecr.io'

  armServiceConnection: 'arm-service-connection'

stages:
- stage: Build
  displayName: 'Build Frontend Service'
  jobs:
  - job: BuildJob
    steps:
    - template: build.yaml@templates
      parameters:
        serviceName: 'frontend-service'
        devAcrConnection: '$(devAcrConnection)'
        imageRepository: '$(imageRepository)'

- stage: DeployDev
  displayName: 'Deploy to Development'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dast-scan'))
  jobs:
  - template: deploy.yaml@templates
    parameters:
      environmentName: 'dev'
      namespace: 'dev'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: false
      targetAcrConnection: '$(devAcrConnection)'
      targetAcrLoginServer: '$(devAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'frontend-service'
      imageUrl: '$(devImageUrl)'
      phraseUrl: '$(devPhraseUrl)'

- stage: DASTScan
  displayName: 'DAST Security Scan'
  dependsOn: DeployDev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dast-scan'))
  jobs:
  - job: DASTScanJob
    steps:
    - task: KubectlInstaller@0
      displayName: 'Install Kubectl'
      inputs:
        kubectlVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'Get Frontend Service URL from AKS'
      inputs:
        azureSubscription: '$(armServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group $(aksResourceGroup) \
            --name $(aksClusterName) \
            --overwrite-existing

          EXTERNAL_IP=$(kubectl get svc frontend-service -n dev \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          if [ -z "$EXTERNAL_IP" ]; then
            echo "No LoadBalancer IP found, trying hostname..."
            EXTERNAL_IP=$(kubectl get svc frontend-service -n dev \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          fi

          if [ -z "$EXTERNAL_IP" ]; then
            echo "##vso[task.logissue type=error]Could not resolve frontend-service external IP or hostname."
            exit 1
          fi

          echo "Frontend Service URL: http://$EXTERNAL_IP"
          echo "##vso[task.setvariable variable=dastTargetUrl]http://$EXTERNAL_IP"

    - script: |
        mkdir -p $(Pipeline.Workspace)/zap-reports

        echo "Running OWASP ZAP DAST scan against: $(dastTargetUrl)"

        docker pull ghcr.io/zaproxy/zaproxy:stable

        docker run --rm \
          -v $(Pipeline.Workspace)/zap-reports:/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
            -t "$(dastTargetUrl)" \
            -r zap-report.html \
            -I
      displayName: 'Run OWASP ZAP DAST Scan'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish DAST Report'
      condition: always()
      inputs:
        pathToPublish: '$(Pipeline.Workspace)/zap-reports'
        artifactName: 'zap-security-report'
        publishLocation: 'Container'

- stage: ApproveTesting
  displayName: 'Manual Approval - Promote to Testing'
  dependsOn: DASTScan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dast-scan'))
  jobs:
  - job: WaitForApprovalTesting
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Please validate Dev deployment and DAST scan results before approving promotion to Testing.'

- stage: DeployTest
  displayName: 'Deploy to Testing'
  dependsOn: ApproveTesting
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dast-scan'))
  jobs:
  - template: deploy.yaml@templates
    parameters:
      environmentName: 'testing'
      namespace: 'test'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: true
      sourceAcrConnection: '$(devAcrConnection)'
      sourceAcrLoginServer: '$(devAcrLoginServer)'
      targetAcrConnection: '$(testAcrConnection)'
      targetAcrLoginServer: '$(testAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'frontend-service'
      imageUrl: '$(testImageUrl)'
      phraseUrl: '$(testPhraseUrl)'

- stage: ApproveProd
  displayName: 'Manual Approval - Promote to Production'
  dependsOn: DeployTest
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dast-scan'))
  jobs:
  - job: WaitForApprovalProd
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Please confirm Testing sign-off and approve Production deployment.'

- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: ApproveProd
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dast-scan'))
  jobs:
  - template: deploy.yaml@templates
    parameters:
      environmentName: 'prod'
      namespace: 'prod'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: true
      sourceAcrConnection: '$(testAcrConnection)'
      sourceAcrLoginServer: '$(testAcrLoginServer)'
      targetAcrConnection: '$(prodAcrConnection)'
      targetAcrLoginServer: '$(prodAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'frontend-service'
      imageUrl: '$(prodImageUrl)'
      phraseUrl: '$(prodPhraseUrl)'